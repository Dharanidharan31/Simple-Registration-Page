<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Page</title>
    <link rel="stylesheet" href="/My Projects/Registration form/registrationpage.css">
</head>
<body>
    <h1 align="center">USER REGISTRATION PAGE</h1>
    <div class="registrationbox">
    <form action="./completed.html" id="form" method="POST" class="form">
        <table>
            <tr>
                <td><label for="name">Name</label></td>
                <td><input type="text" id="name" required></td>
            </tr>
            <tr>
                <td><label for="email">Email-ID</label></td>
                <td><input type="email" id="email" required></td>
            </tr>
            <tr>
                <td><label for="password">Password</label></td>
                <td><input type="password" id="password" required></td>
            </tr>
            <tr>
                <td><label for="dob">Date Of Birth</label></td>
                <td><input type="date" id="dob" required></td>
            </tr>
            <tr>
                <td><label for="education">Education Qualification</label></td>
                <td><select name="education" id="education" required>
                    <option value="10th">10th</option>
                    <option value="12th">12th</option>
                    <option value="diploma">Diploma</option>
                    <option value="BSc">BSc</option>
                    <option value="BBA">BBA</option>
                    <option value="BA">BA</option>
                    <option value="BE">BE</option>
                </select></td>
            </tr>
            <tr>
                <td><label for="gender">Gender</label></td>
                <td><input type="radio" name="gender" value="male" id="gender">
                    <label>Male</label>
                    <input type="radio" name="gender" value="female" id="gender">
                    <label>Female</label></td>
            </tr>
            <tr>
                <td><label for="country">Country</label></td>
                <td><select name="country" id="country" required>
                    <option value="India">India</option>
                    <option value="Pakistan">Pakistan</option>
                    <option value="China">China</option>
                    <option value="America">America</option>
                    <option Valie="Others">Others</option>
                </select></td>
            </tr>
            <tr>
                <td><label for="state">State</label></td>
                <td><select name="state" id="state" required>
                    <option value="TamilNadu">TamilNadu</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Andra Pradesh">Andra Pradesh</option>
                    <option value="Karanataka">Karnataka</option>
                    <option value="Uttar Pradesh">Utter Pradesh</option>
                    <option value="Bihar">Bihar</option>
                </select></td>
            </tr>
            <tr>
                <td><label for="address1">Current Address</label></td>
                <td><textarea name="address" id="address1" required maxlength="100"></textarea></td>
            </tr>
            <tr>
                <td><label for="address2">Permanent Address</label></td>
                <td><textarea name="address" id="address2" required maxlength="100"></textarea></td>
            </tr>
            <tr>
                <td><label for="pincode">Pincode</label></td>
                <td><input type="text" id="pincode"></td>
            </tr>
            <tr>
                <td><label for="language">Language</label></td>
                <td><select name="language" id="language" required>
                    <option value="tamil">Tamil</option>
                    <option value="english">English</option>
                    <option value="hindi">Hindi</option>
                </select></td>
            </tr>
            <tr>
                <td><label for="contactno">Contact Number</label></td>
                <td><input type="text" id="contactno" required></td>
            </tr>
            <tr>
                <td><button type="submit" onclick="submit" id="submite">Register</button>
                    <button type="reset" onclick="reset">Reset</button>
                </td>
            </tr>
            <!-- <tr>
                <td colspan="2" rowspan="2"><button  class="button" type="submit" id="submite">Login</button> <button type="reset">Reset</button></td>
            </tr> -->
        </table>

    </form>
    </div>

    <script src="registrationpage.js">
   
    </script>
</body>
</html>
